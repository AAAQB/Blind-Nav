<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BlindNav — Smart Navigation for the Visually Impaired</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
/* ── Reset & Base ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:#f5f5f7;color:#1d1d1f;overflow:hidden;height:100vh;width:100vw;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
#root{width:100%;height:100%;display:flex}

/* ── Sidebar ── */
.sidebar{width:400px;min-width:400px;background:#fff;display:flex;flex-direction:column;
  border-right:1px solid rgba(0,0,0,.06);z-index:1000}
.sidebar-hd{padding:28px 28px 22px;background:#fff;position:relative;overflow:hidden;border-bottom:1px solid rgba(0,0,0,.06)}
.sidebar-hd h2{font-size:19px;font-weight:700;letter-spacing:-.3px;
  display:flex;align-items:center;gap:10px;color:#1d1d1f}
.sidebar-bd{flex:1;overflow-y:auto;padding:22px 28px 28px;scroll-behavior:smooth}
.sidebar-bd::-webkit-scrollbar{width:4px}
.sidebar-bd::-webkit-scrollbar-thumb{background:#d2d2d7;border-radius:4px}
.sidebar-bd::-webkit-scrollbar-thumb:hover{background:#aeaeb2}
.sidebar-bd::-webkit-scrollbar-track{background:transparent}

/* ── Section ── */
.sec{margin-bottom:22px}
.sec-lbl{font-size:10px;font-weight:700;color:#aeaeb2;text-transform:uppercase;
  letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px;
  position:relative}
.sec-lbl::before{content:'';display:inline-block;width:2px;height:12px;
  background:#1d1d1f;border-radius:1px}

/* ── Toggle buttons (Start/End pick) ── */
.tgl-group{display:flex;gap:8px;margin-bottom:8px}
.tgl{flex:1;padding:10px 14px;border:1px solid #d2d2d7;border-radius:10px;
  background:#fff;color:#86868b;font-size:13px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .25s cubic-bezier(.4,0,.2,1);user-select:none}
.tgl:hover{border-color:#1d1d1f;background:#f5f5f7;transform:translateY(-1px)}
.tgl:active{transform:translateY(0)}
.tgl.s{background:#f2f9f2;border-color:#34c759;color:#1a8a3a;
  box-shadow:0 0 0 3px rgba(52,199,89,.15)}
.tgl.e{background:#fef2f2;border-color:#ff3b30;color:#c41e1e;
  box-shadow:0 0 0 3px rgba(255,59,48,.15)}
.tgl.x{padding:10px 14px;border-color:#d2d2d7;color:#86868b;flex:0;font-size:13px;font-weight:400}
.tgl.x:hover{border-color:#ff3b30;color:#ff3b30;background:#fef2f2}

/* ── Hint banner ── */
.hint-banner{padding:10px 14px;background:#f5f5f7;border:1px solid rgba(0,0,0,.06);
  border-radius:10px;font-size:12px;color:#1d1d1f;margin-bottom:16px;text-align:center;font-weight:500;
  animation:fadeSlideIn .35s cubic-bezier(.4,0,.2,1)}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ── Coordinate rows ── */
.coord{margin-bottom:4px}
.coord:last-child{margin-bottom:0}
.coord-label{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.coord-label .dot-wrap{display:flex;align-items:center;justify-content:center;width:14px;height:14px;flex-shrink:0}
.coord-label .dot-s,.coord-label .dot-e{width:8px;height:8px;border-radius:50%;position:relative}
.coord-label .dot-s{background:#34c759;box-shadow:0 0 0 2.5px rgba(52,199,89,.2)}
.coord-label .dot-e{background:#ff3b30;box-shadow:0 0 0 2.5px rgba(255,59,48,.2)}
.coord-label span{font-size:12px;font-weight:600;color:#1d1d1f}
.coord-inputs{display:flex;gap:8px}
.cf{flex:1;padding:9px 12px;border:1.5px solid #e8e8ed;border-radius:10px;font-size:13px;
  font-family:'SF Mono',Menlo,Consolas,monospace;outline:none;background:#fafafa;
  transition:all .2s cubic-bezier(.4,0,.2,1);color:#1d1d1f}
.cf::placeholder{color:#aeaeb2}
.cf:hover{border-color:#d2d2d7}
.cf:focus{border-color:#1d1d1f;box-shadow:0 0 0 3px rgba(0,0,0,.08);background:#fff}
.cf:invalid{border-color:#ff3b30;background:#fef2f2}
.cf:invalid:focus{box-shadow:0 0 0 3px rgba(255,59,48,.12)}

/* ── Dot indicators (global map markers) ── */
.dot-wrap{display:flex;align-items:center;justify-content:center;width:18px;height:18px;flex-shrink:0}
.dot-s,.dot-e{width:10px;height:10px;border-radius:50%;position:relative}
.dot-s{background:#34c759;box-shadow:0 0 0 3px rgba(52,199,89,.2)}
.dot-e{background:#ff3b30;box-shadow:0 0 0 3px rgba(255,59,48,.2)}

/* ── Pill grid (areas, modes) ── */
.pill-grid{display:grid;gap:6px}
.pill-grid-3{grid-template-columns:1fr 1fr 1fr}
.pill-grid-4{grid-template-columns:1fr 1fr 1fr 1fr}
.pill-grid-6{grid-template-columns:1fr 1fr 1fr}
.pill{padding:10px 6px;border:1px solid #e8e8ed;border-radius:10px;background:#fff;
  color:#86868b;font-size:13px;font-weight:500;cursor:pointer;text-align:center;
  transition:all .25s cubic-bezier(.4,0,.2,1);user-select:none;
  display:flex;align-items:center;justify-content:center;gap:6px}
.pill:hover{border-color:#1d1d1f;background:#f5f5f7;transform:translateY(-1px)}
.pill:active{transform:translateY(0)}
.pill.a{background:#1d1d1f;border-color:#1d1d1f;color:#fff;
  box-shadow:0 4px 12px rgba(0,0,0,.15);transform:translateY(-1px)}

/* ── Time slider ── */
.time-display{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
.time-value{font-size:28px;font-weight:700;color:#1d1d1f;letter-spacing:-1px;
  font-variant-numeric:tabular-nums}
.time-slot{font-size:13px;font-weight:500;color:#86868b;display:flex;align-items:center;gap:6px}
.ts{width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;
  background:#e8e8ed;outline:none;margin:0;transition:background .3s ease;cursor:pointer}
.ts::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;
  background:#fff;border:2.5px solid #1d1d1f;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.15);transition:transform .2s cubic-bezier(.4,0,.2,1),
  box-shadow .2s ease}
.ts::-webkit-slider-thumb:hover{transform:scale(1.15);box-shadow:0 4px 12px rgba(0,0,0,.2)}
.ts::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;
  border:2.5px solid #1d1d1f;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.ts-labels{display:flex;justify-content:space-between;font-size:10px;color:#aeaeb2;margin-top:6px;padding:0 2px}
.ts-labels span{transition:color .2s ease}

/* ── Primary button ── */
.btn-primary{width:100%;padding:15px 20px;border:none;border-radius:12px;font-size:15px;
  font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .25s cubic-bezier(.4,0,.2,1);background:#1d1d1f;color:#fff;
  box-shadow:0 4px 16px rgba(0,0,0,.12);letter-spacing:.3px;position:relative;overflow:hidden}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08),transparent 50%);
  pointer-events:none}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.18)}
.btn-primary:active:not(:disabled){transform:translateY(0);box-shadow:0 2px 8px rgba(0,0,0,.12)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:spin .7s cubic-bezier(.6,0,.4,1) infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Error / Result cards ── */
.err{margin-top:18px;padding:12px 16px;background:#fef2f2;border:1px solid rgba(255,59,48,.12);
  border-radius:10px;color:#c41e1e;font-size:13px;line-height:1.5;display:flex;align-items:flex-start;gap:8px;
  animation:fadeSlideIn .3s ease}
.res{margin-top:18px;padding:0;background:#fff;border:1px solid rgba(0,0,0,.06);
  border-radius:14px;overflow:hidden;animation:fadeSlideIn .4s cubic-bezier(.4,0,.2,1)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.res-hd{padding:16px 20px 14px;border-bottom:1px solid rgba(0,0,0,.04);
  display:flex;align-items:center;gap:10px}
.res-hd-icon{width:28px;height:28px;border-radius:50%;background:#f0fdf4;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.res-hd h4{font-size:14px;font-weight:700;color:#1d1d1f}
.res-hd span{font-size:11px;color:#86868b}
.res-body{padding:14px 20px 18px}
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.res-item{padding:8px 0;border-bottom:1px solid rgba(0,0,0,.03);animation:fadeSlideUp .4s ease both}
.res-item:nth-child(1){animation-delay:0ms}
.res-item:nth-child(2){animation-delay:50ms}
.res-item:nth-child(3){animation-delay:100ms}
.res-item:nth-child(4){animation-delay:150ms}
.res-item:nth-child(5){animation-delay:200ms}
.res-item:nth-child(6){animation-delay:250ms}
.res-item:nth-child(7){animation-delay:300ms}
.res-item:nth-child(8){animation-delay:350ms}
.res-item .rk{font-size:11px;color:#aeaeb2;display:block;margin-bottom:2px;font-weight:500}
.res-item .rv{font-size:14px;font-weight:700;color:#1d1d1f;display:block;
  font-variant-numeric:tabular-nums}
.res-item.highlight{padding:10px 0}
.res-item.highlight .rk{font-size:11px}
.res-item.highlight .rv{font-size:18px;letter-spacing:-.5px}

/* ── Analysis card ── */
.analysis{margin-top:12px;padding:16px 18px;background:#fafafa;border-radius:10px;
  border:1px solid rgba(0,0,0,.04)}
.analysis-title{font-size:12px;font-weight:700;color:#1d1d1f;margin-bottom:14px;
  display:flex;align-items:center;gap:6px}
.bar-group{margin-bottom:10px}
.bar-group:last-child{margin-bottom:0}
.bar-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.bar-label span:first-child{color:#86868b}
.bar-label span:last-child{font-weight:700;color:#1d1d1f;font-variant-numeric:tabular-nums}
.bar-track{height:5px;background:#e8e8ed;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1);
  position:relative}
.bar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3));
  border-radius:3px}
.analysis-note{font-size:11px;color:#86868b;line-height:1.7;margin-top:12px;
  padding-top:10px;border-top:1px solid rgba(0,0,0,.04)}
.analysis-note div{padding:3px 0;display:flex;align-items:center;gap:4px}
.analysis-note div::before{content:'·';font-weight:700;color:#1d1d1f}

/* ── Map area ── */
.ma{flex:1;display:flex;flex-direction:column;position:relative}
.mc{flex:1;position:relative}
.mc .maplibregl-map{width:100%;height:100%}

/* ── Style switcher ── */
.style-switcher{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:1000;display:flex;gap:3px;background:rgba(255,255,255,.78);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  padding:4px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);
  border:1px solid rgba(255,255,255,.5)}
.style-btn{border:none;background:transparent;color:#86868b;padding:7px 14px;border-radius:8px;
  font-size:11px;font-weight:600;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1)}
.style-btn:hover{color:#1d1d1f;background:rgba(0,0,0,.04)}
.style-btn.a{background:#1d1d1f;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.style-btn.a:hover{background:#1d1d1f;color:#fff}

/* ── Responsive ── */
@media(max-width:820px){
  #root{flex-direction:column}
  .sidebar{width:100%;min-width:0;max-height:45vh;border-right:none;
    border-bottom:1px solid rgba(0,0,0,.06);transition:max-height .4s cubic-bezier(.4,0,.2,1)}
  .sidebar-hd{padding:20px 22px 16px}
  .sidebar-bd{padding:16px 18px 20px}
  .mc{min-height:55vh}
  .pill-grid-6{grid-template-columns:1fr 1fr 1fr}
  .res-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .sidebar{max-height:40vh}
  .sidebar-hd{padding:16px 18px 14px}
  .sidebar-hd h2{font-size:17px}
  .sidebar-bd{padding:14px 16px 18px}
  .coord-label{margin-bottom:4px}
  .coord-inputs{gap:6px}
  .cf{padding:7px 10px;font-size:12px}
  .pill-grid-3,.pill-grid-4,.pill-grid-6{grid-template-columns:1fr 1fr}
  .pill{padding:8px 4px;font-size:12px}
  .time-value{font-size:24px}
  .res-body{padding:12px 16px 16px}
  .res-grid{grid-template-columns:1fr;gap:4px}
  .res-item.highlight .rv{font-size:16px}
}
  </style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
'use strict';

var h=React.createElement,u=React.useState,E=React.useEffect,R=React.useRef,C=React.useCallback;

/* ═══════════════════════════════════════
   SVG Icon Components
   ═══════════════════════════════════════ */
var icons={};
function defIcon(name,paths,viewBox){
  icons[name]=function(props){
    var p=props||{};
    return h('svg',{width:p.size||20,height:p.size||20,viewBox:viewBox||'0 0 24 24',

      strokeLinecap:'round',strokeLinejoin:'round'},

        fill:p.fill||'none',strokeWidth:p.sw||1.5,strokeLinecap:'round',strokeLinejoin:'round'});}));
  };
}

/* Navigation compass / logo */
defIcon('compass',[
  'M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z',
  'M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z',
  'M12 12m-1.5 0a1.5 1.5 0 1 0 3 0 1.5 1.5 0 1 0-3 0'
]);

/* Map pin */
defIcon('pin',['M12 2a8 8 0 0 0-8 8c0 5.25 8 12 8 12s8-6.75 8-12a8 8 0 0 0-8-8z','M12 6a4 4 0 1 0 0 8 4 4 0 0 0 0-8z']);

defIcon('eye',['M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7z','M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z']);

/* Moon (night) */
defIcon('moon',['M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z']);

/* Baby (stroller) */
defIcon('baby',['M8 22a2 2 0 1 0 0-4 2 2 0 0 0 0 4z','M18 22a2 2 0 1 0 0-4 2 2 0 0 0 0 4z','M4 4h3l2 10h10','M5 8h13a2 2 0 0 1 2 2v4H7']);

/* Scale/Balance */
defIcon('balance',['M12 2v20M4 6l8-4 8 4M4 6v6a8 8 0 0 0 16 0V6M4 12h16','M12 2a4 4 0 0 0-4 4']);

/* Clock */

/* Globe */
defIcon('globe',['M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z','M2 12h20','M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z']);

/* Route path */
defIcon('route',['M5 20a3 3 0 1 0 0-6 3 3 0 0 0 0 6z','M19 10a3 3 0 1 0 0-6 3 3 0 0 0 0 6z','M5 17V7a4 4 0 0 1 4-4h4','M13 5l3 3-3 3']);
defIcon('routeLine',['M5 20a3 3 0 1 0 0-6 3 3 0 0 0 0 6z','M19 10a3 3 0 1 0 0-6 3 3 0 0 0 0 6z','M6 17.5L18 8.5']);

/* X close */

/* Check */

/* Arrow right */
defIcon('arrowRight',['M5 12h14M13 5l7 7-7 7']);

/* Sun */
defIcon('sun',['M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42','M12 6a6 6 0 1 0 0 12 6 6 0 0 0 0-12z']);

/* Bar chart */
defIcon('barChart',['M18 20V10M12 20V4M6 20v-6']);
defIcon('barChart3',['M18 20V14M12 20V8M6 20v-4']);

/* Warning */
defIcon('warning',['M12 2L2 20h20L12 2z','M12 8v4','M12 16h.01']);

/* Info */
defIcon('info',['M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z','M12 16v-4','M12 8h.01']);

/* Walk */
defIcon('walk',['M12 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4z','M9 22l2-8-3-3','M13 14l3 3 1 5','M7 12l4-2h2l3 3']);

/* Stairs */
defIcon('stairs',['M4 20h16M8 16l3-4M11 12l3-4M14 8l3-4M4 20l4-16']);

/* Light bulb */
defIcon('bulb',['M12 18v-5a5 5 0 1 0-5-5c0 2.76 2.24 5 5 5v5','M12 18v3','M10 21h4']);

/* Road/path */
defIcon('road',['M4 20L20 4M10 20L20 10M4 10l6 6']);

/* Sidewalk */
defIcon('sidewalk',['M6 20V4M18 20V10M6 12h8M14 14l4-4M6 8l4-4']);

/* Search */
defIcon('search',['M14 14l6 6M10 4a6 6 0 1 0 0 12 6 6 0 0 0 0-12z']);

/* ── sizing helper ── */
function ic(name,size,stroke){
  return h(icons[name],{size:size||18,stroke:stroke||'currentColor'});
}

/* ═══════════════════════════════════════
   Constants
   ═══════════════════════════════════════ */
var ORIG={sl:3.1489,sn:101.6957,el:3.1400,en:101.7000,cx:[3.110,101.686],z:14};
var MODES=[
  {id:'blind',l:'Blind',ic:'eyeOff'},{id:'wheelchair',l:'Wheelchair',ic:'wheelchair'},
  {id:'elderly',l:'Elderly',ic:'elderly'},{id:'balanced',l:'Balanced',ic:'balance'},
];
var COL={blind:'#ff3b30',wheelchair:'#f59e0b',elderly:'#8b5cf6',
          balanced:'#636e72',
          path:'#0071e3'};

var AREAS=[
  {id:'kl',name:'Kuala Lumpur',lat:3.1489,lon:101.6957,el:3.1400,en:101.7000,z:14},
  {id:'singapore',name:'Singapore',lat:1.290,lon:103.843,z:15},
  {id:'tokyo',name:'Tokyo',lat:35.659,lon:139.700,z:14},
  {id:'berlin',name:'Berlin',lat:52.520,lon:13.405,z:13},
];

var HOUR_SLOTS=[
  [0,5,'Late Night','moon'],[5,7,'Dawn','sun'],[7,12,'Morning','sun'],
  [12,14,'Noon','sun'],[14,18,'Afternoon','sun'],[18,20,'Dusk','sun'],
  [20,23,'Night','moon'],[23,24,'Late Night','moon'],
];
function getSlot(h){for(var i=0;i<HOUR_SLOTS.length;i++){if(h>=HOUR_SLOTS[i][0]&&h<HOUR_SLOTS[i][1])return HOUR_SLOTS[i];}return['-','Unknown','moon'];}

function fmt4(v){return typeof v==='number'?v.toFixed(4):String(v)}

/* ── API helper ── */
function api(url,body){
  return fetch('/api/'+url,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)}).then(function(r){
      return r.json().then(function(d){
        if(!r.ok){throw new Error(d.error||'HTTP '+r.status);}
        return d;
      });
    });
}

var OSM_RASTER={version:8,name:'OSM',
  sources:{osm:{type:'raster',tiles:['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
    tileSize:256,attribution:'&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>'}},

/* ═══════════════════════════════════════
   MapView Component

function MapView(p){
  var mt=R(null),cr=R(null),mk=R([]),al=R([]),ch=R(null),lid=R(0);
  var rd=u(0),rr=rd[0],sr=rd[1];
  ch.current=p.onClick;

  function resolveStyle(su){return su==='osm_raster'?OSM_RASTER:su;}

  E(function(){
    var c=p.center||{lon:ORIG.cx[1],lat:ORIG.cx[0],z:ORIG.z};
    if(mt.current)return;
    var m=new maplibregl.Map({
      container:cr.current,
      style:resolveStyle(p.styleUrl||'osm_raster'),
      center:[c.lon,c.lat],zoom:c.z||ORIG.z,
    });
    m._sty=resolveStyle(p.styleUrl||'osm_raster');
    m.addControl(new maplibregl.NavigationControl(),'top-right');
    m.on('click',function(e){if(ch.current)ch.current({lat:e.lngLat.lat,lng:e.lngLat.lng});});
    m.on('load',function(){mt.current=m;sr(rr+1);});
    mt.current=m;
    return function(){mt.current&&(mt.current.remove(),mt.current=null);};
  },[]);

  E(function(){
    var m=mt.current;if(!m)return;
    var su=resolveStyle(p.styleUrl||'osm_raster');
    if(su!==m._sty){m.setStyle(su);m._sty=su;m.once('style.load',function(){sr(rr+1);});}
  },[p.styleUrl]);

  E(function(){
    var m=mt.current;if(!m)return;
    if(p.center&&p.center.lat){m.flyTo({center:[p.center.lon,p.center.lat],zoom:p.center.z||13});}
  },[p.center]);

  E(function(){
    var m=mt.current;if(!m)return;
    mk.current.forEach(function(x){x.remove();});mk.current=[];
    var s=p.sc,e=p.ec;
    if(s&&s.lat!=null){
      var el=document.createElement('div');
      el.style.cssText='width:22px;height:22px;border-radius:50%;background:#34c759;'+
        'border:3px solid #fff;box-shadow:0 0 0 3px rgba(52,199,89,.4);cursor:pointer';
      el.title='Start';
      mk.current.push(new maplibregl.Marker({element:el}).setLngLat([s.lon,s.lat]).addTo(m));
    }
    if(e&&e.lat!=null){
      var el2=document.createElement('div');
      el2.style.cssText='width:22px;height:22px;border-radius:50%;background:#ff3b30;'+
        'border:3px solid #fff;box-shadow:0 0 0 3px rgba(255,59,48,.4);cursor:pointer';
      el2.title='End';
      mk.current.push(new maplibregl.Marker({element:el2}).setLngLat([e.lon,e.lat]).addTo(m));
    }
    if(s&&e&&s.lat!=null&&e.lat!=null){
      m.fitBounds([[s.lon,s.lat],[e.lon,e.lat]],{padding:80});
    }
  },[p.sc,p.ec,rr]);

  E(function(){
    var m=mt.current;if(!m)return;
    al.current.forEach(function(id){
      try{if(m.getLayer(id))m.removeLayer(id);}catch(e){}
      try{if(m.getSource(id))m.removeSource(id);}catch(e){}
    });
    al.current=[];
    var pl=p.pl||[];
    var allPts=[];
    pl.forEach(function(pt){
      if(!pt.c||pt.c.length<2)return;
      var id='route_'+(lid.current++);
      var coords=pt.c.map(function(a){return[a[1],a[0]];});
      try{
        m.addSource(id,{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:coords}}});
        m.addLayer({id:id+'_glow',type:'line',source:id,
          paint:{'line-color':pt.color||'#0071e3','line-width':9,'line-opacity':0.15}});
        m.addLayer({id:id,type:'line',source:id,
          paint:{'line-color':pt.color||'#0071e3','line-width':3.5,'line-opacity':0.85}});
        al.current.push(id+'_glow');
        al.current.push(id);
      }catch(e){}
      coords.forEach(function(c){allPts.push(c);});
    });
    if(allPts.length>1){
      var b=allPts.reduce(function(a,c){return[[Math.min(a[0][0],c[0]),Math.min(a[0][1],c[1])],[Math.max(a[1][0],c[0]),Math.max(a[1][1],c[1])]];},[allPts[0],allPts[0]]);
      try{m.fitBounds(b,{padding:60});}catch(e){}
    }
  },[p.pl,rr]);

  return h('div',{style:{position:'relative',height:'100%',width:'100%'}},
    h('div',{ref:cr,style:{height:'100%',width:'100%'}}));
}

/* ═══════════════════════════════════════
   Result Renderer
   ═══════════════════════════════════════ */
var HIGHWAY_LABELS={
  footway:'Footway',path:'Path',pedestrian:'Pedestrian',steps:'Steps',
  living_street:'Living St.',residential:'Residential',service:'Service',
  track:'Track',tertiary:'Tertiary',secondary:'Secondary',primary:'Primary',
  unclassified:'Unclassified',crossing:'Crosswalk',unknown:'Unknown',
};

function renderResult(rr,hour){
  if(!rr)return null;
  var dist=rr.total_distance_m;
  var walkMin=Math.round(dist/1.4/60);
  var walkStr=walkMin<1?'<1 min':(walkMin<60?walkMin+' min':Math.floor(walkMin/60)+'h '+walkMin%60+'min');
  var slot=getSlot(hour||14);
  var an=rr.route_analysis;
  var algoName=rr.algorithm==='bidirectional_a*'?'Bidirectional A*':'Weighted A*';

  /* ── Metrics rows for grid ── */
  var metrix=[
    {k:'Distance',v:dist+' m',hl:true},
    {k:'Est. Time',v:walkStr,hl:true},
    {k:'Time Slot',v:slot[2]},
    {k:'Total Cost',v:rr.total_cost.toFixed(1)},
    {k:'Nodes Explored',v:rr.explored_count},
    {k:'Path Nodes',v:rr.num_nodes},
    {k:'Algorithm',v:algoName},
  ];

  /* ── Analysis ── */
  var analysisEl=null;
  if(an){
    var bars=[];
    function bar(lbl,pct,color){
      var w=Math.min(pct,100);
      bars.push(h('div',{className:'bar-group',key:lbl},
        h('div',{className:'bar-label'},
          h('span',null,lbl),h('span',null,pct+'%')),
        h('div',{className:'bar-track'},
          h('div',{className:'bar-fill',style:{width:w+'%',background:color}}))));
    }
    bar('Tactile Paving',an.tactile_paving_pct,'#34c759');
    bar('Lighting',an.lit_pct,'#f59e0b');
    bar('Sidewalk',an.sidewalk_pct,'#0071e3');

    var notes=[];
    if(an.tactile_paving_pct>=70)notes.push('Good tactile paving coverage for visually impaired');
    else if(an.tactile_paving_pct>=40)notes.push('Moderate tactile paving coverage');
    else notes.push('Limited tactile paving, stay alert');

    if(an.steps_count===0)notes.push('No steps on route');
    else if(an.steps_count<=3)notes.push(an.steps_count+' step(s) along the way');
    else notes.push(an.steps_count+' steps along the way, watch your step');

    if(an.lit_pct>=70)notes.push('Well-lit route');
    else if(an.lit_pct>=30)notes.push('Some sections poorly lit');

    if(an.sidewalk_pct>=60)notes.push('Most sections have sidewalks');
    else notes.push('Some sections lack sidewalks');

    var hwStr='—';
    if(an.top_highways&&an.top_highways.length){
      hwStr=an.top_highways.map(function(h){
        return (HIGHWAY_LABELS[h.name]||h.name)+' '+h.pct+'%';
      }).join('、');
    }

    analysisEl=h('div',{className:'analysis'},
      h('div',{className:'analysis-title'},ic('barChart3',14,'#1d1d1f'),' Route Analysis'),
      h('div',{style:{fontSize:'11px',color:'#86868b',marginBottom:'10px'}},'Main roads: '+hwStr),
      bars,
      h('div',{className:'analysis-note'},
        notes.map(function(n,i){return h('div',{key:i},n);})));
  }

  return h('div',{className:'res'},
    h('div',{className:'res-hd'},
      h('div',{className:'res-hd-icon'},ic('check',14,'#34c759')),
      h('div',null,
        h('h4',null,'Route Found'),
        h('span',null,'Optimal path found'))),
    h('div',{className:'res-body'},
      h('div',{className:'res-grid'},
        metrix.map(function(m,i){
          return h('div',{className:'res-item'+(m.hl?' highlight':''),key:i},
            h('span',{className:'rk'},m.k),
            h('span',{className:'rv'},m.v));
        })),
      analysisEl));
}

    var slv=parseFloat(sliv),snv=parseFloat(sniv),elv=parseFloat(eliv),env=parseFloat(eniv);

      /* Click-mode toggles */
      h('div',{className:'sec'},
        h('div',{className:'tgl-group'},
          h('button',{className:'tgl'+(p.cm==='start'?' s':''),
            onClick:function(){p.sm(p.cm==='start'?null:'start');}},
            ic('flag',16,p.cm==='start'?'#1a8a3a':'#86868b'),' Start'),

            ic('target',16,p.cm==='end'?'#c41e1e':'#86868b'),' End'),

          h('div',{className:'coord-inputs'},
            h('input',{className:'cf',value:sliv,placeholder:'Lat',onChange:function(e){ssli(e.target.value);p.scl('lat',e.target.value);}}),
            h('input',{className:'cf',value:sniv,placeholder:'Lng',onChange:function(e){ssni(e.target.value);p.scl('lon',e.target.value);}}))),
        h('div',{className:'coord'},
          h('div',{className:'coord-label'},h('div',{className:'dot-wrap'},h('div',{className:'dot-e'})),h('span',null,'End')),
          h('div',{className:'coord-inputs'},
            h('input',{className:'cf',value:eliv,placeholder:'Lat',onChange:function(e){ssel(e.target.value);p.ecl('lat',e.target.value);}}),
            h('input',{className:'cf',value:eniv,placeholder:'Lng',onChange:function(e){ssen(e.target.value);p.ecl('lon',e.target.value);}})))),

      /* Area */
      h('div',{className:'sec'},
        h('div',{className:'sec-lbl'},ic('globe',14,'#86868b'),' Region'),
        h('div',{className:'pill-grid pill-grid-3'},
          AREAS.map(function(a){
            return h('button',{key:a.id,className:'pill'+(area===a.id?' a':''),
              onClick:function(){sa(a.id);p.onAreaChange(a.lat,a.lon,a.el,a.en,a.z);}},a.name);}))),
